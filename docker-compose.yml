# ============================================================
# 多智能体工业排障 RAG 系统 - Docker Compose 编排
# ============================================================

services:
  # ==================== Qdrant 向量数据库 ====================
  qdrant:
    image: docker.1ms.run/qdrant/qdrant:latest
    container_name: rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== Redis 缓存 / 会话 ====================
  redis:
    image: docker.1ms.run/library/redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ==================== 后端 API 服务 ====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rag-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 本地模型目录挂载（不在镜像内，需宿主机提前准备）
      - ./models/BAAI:/app/models/BAAI:ro
      # 图片目录（与前端共享）
      - ./images:/app/images:ro
    env_file:
      - .env
    environment:
      # 覆盖为 Docker 内部服务地址
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379/0
      - STATIC_BASE_URL=http://localhost:8080/static
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ==================== 数据注入（仅首次运行） ====================
  ingest:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rag-ingest
    restart: "no"
    command: python ingest.py --force
    volumes:
      - ./models/BAAI:/app/models/BAAI:ro
      - ./images:/app/images:ro
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      backend:
        condition: service_healthy

  # ==================== 前端 Nginx 服务 ====================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rag-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local
